<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Notice Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Subtle Background Effect */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(100, 255, 218, 0.1), transparent);
            animation: glow 12s infinite ease-in-out;
        }

        @keyframes glow {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.15); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        .dashboard {
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 1;
        }

        .dashboard:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            background: linear-gradient(90deg, #ff577f, #ff8e53);
            color: #fff;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
            text-shadow: 2px 2px 8px rgba(255, 87, 127, 0.3);
        }

        .menu-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .menu-btn:hover {
            transform: rotate(90deg);
        }

        .menu {
            position: absolute;
            top: 80px;
            right: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .menu.active {
            display: flex;
        }

        .menu button, .menu a {
            background: none;
            border: none;
            padding: 14px 25px;
            font-size: 18px;
            color: #00ecca;
            cursor: pointer;
            text-align: left;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.3s;
            text-decoration: none;
            font-weight: 600;
        }

        .menu button:hover, .menu a:hover {
            background-color: #00ecca;
            color: #1a1a2e;
            transform: translateX(5px);
        }

        .content {
            padding: 40px;
            height: calc(100% - 80px);
            overflow-y: auto;
            color: #b3c6ff;
        }

        .content h2 {
            margin-bottom: 30px;
            font-size: 36px;
            font-weight: 700;
            color: #00ecca;
            font-family: 'Roboto Mono', monospace;
            text-shadow: 1px 1px 5px rgba(0, 236, 202, 0.3);
        }

        .content p {
            font-size: 18px;
            line-height: 1.8;
            color: #e0e0e0;
        }

        /* Scrollbar Styling */
        .content::-webkit-scrollbar {
            width: 10px;
        }

        .content::-webkit-scrollbar-thumb {
            background: #ff8e53;
            border-radius: 10px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Digital Notice Board</h1>
            <button class="menu-btn">☰</button>
            <div class="menu">
                <a href="./login.html">Login</a>
                <a href="./postbutton.html">Post Notice</a> <!-- Updated with link -->
                <a href="./setting.html">Setting</a>
                <button>Logout</button>
            </div>
        </div>
        <div class="content">
            <h2>Welcome to the Dashboard</h2>
            <p>Here's the today's Notice</p>
        </div>
    </div>

    <script>
        const menuBtn = document.querySelector('.menu-btn');
        const menu = document.querySelector('.menu');

        menuBtn.addEventListener('click', () => {
            menu.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
